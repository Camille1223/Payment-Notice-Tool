<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>付款通知书生成器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,.1); padding: 40px; width: 100%; max-width: 580px; }
  .logo { font-size: 24px; font-weight: 700; color: #1a73e8; margin-bottom: 4px; }
  .subtitle { color: #666; font-size: 13px; margin-bottom: 28px; }
  .upload-area { border: 2px dashed #d0d7de; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: border-color .2s,background .2s; margin-bottom: 12px; position: relative; }
  .upload-area:hover,.upload-area.drag-over { border-color: #1a73e8; background: #f6f9ff; }
  .upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 26px; margin-bottom: 4px; }
  .upload-label { font-size: 14px; color: #444; font-weight: 500; }
  .upload-hint { font-size: 12px; color: #999; margin-top: 3px; }
  .file-badge { display: none; margin-top: 8px; padding: 3px 10px; background: #e8f0fe; border-radius: 4px; font-size: 12px; color: #1a73e8; word-break: break-all; }
  .tip { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 6px; padding: 10px 14px; font-size: 12px; color: #7d6608; margin-bottom: 14px; line-height: 1.6; }
  .tip code { background: #fff3d0; padding: 1px 5px; border-radius: 3px; font-family: monospace; }
  .btn { width: 100%; padding: 13px; background: #1a73e8; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 6px; transition: background .2s; }
  .btn:hover:not(:disabled) { background: #1557b0; }
  .btn:disabled { background: #a8c7fa; cursor: not-allowed; }
  .progress-bar { height: 4px; background: #e8eaed; border-radius: 2px; margin-top: 14px; overflow: hidden; display: none; }
  .progress-fill { height: 100%; background: #1a73e8; border-radius: 2px; transition: width .4s ease; width: 0; }
  .status { margin-top: 14px; padding: 11px 14px; border-radius: 8px; font-size: 13px; display: none; line-height: 1.6; }
  .status.info    { background: #e8f0fe; color: #1a73e8; }
  .status.success { background: #e6f4ea; color: #137333; }
  .status.error   { background: #fce8e6; color: #c5221f; }
  hr { border: none; border-top: 1px solid #eee; margin: 22px 0; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">付款通知书生成器</div>
  <div class="subtitle">上传模板与数据表，自动生成 Word + PDF，打包下载 · 无需安装任何软件</div>
  <hr>
  <div class="tip">
    <b>模板字段格式：</b>将 Word 模板中的合并字段改为 <code>{字段名}</code>，例如 <code>{公司名称}</code>、<code>{金额}</code>。
    Excel Sheet1 第一行列名需与模板字段一致。
  </div>
  <div class="upload-area" id="wordArea">
    <input type="file" id="wordFile" accept=".docx" onchange="setFile('word',this)">
    <div class="upload-icon">📄</div>
    <div class="upload-label">付款通知书模板 (.docx)</div>
    <div class="upload-hint">点击或拖拽上传，字段格式：{字段名}</div>
    <div class="file-badge" id="wordName"></div>
  </div>
  <div class="upload-area" id="excelArea">
    <input type="file" id="excelFile" accept=".xlsx" onchange="setFile('excel',this)">
    <div class="upload-icon">📊</div>
    <div class="upload-label">付款通知数据表 (.xlsx)</div>
    <div class="upload-hint">Sheet1，第一行为列名</div>
    <div class="file-badge" id="excelName"></div>
  </div>
  <button class="btn" id="btn" disabled onclick="generate()">生成并下载 ZIP</button>
  <div class="progress-bar" id="bar"><div class="progress-fill" id="fill"></div></div>
  <div class="status" id="status"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.7/dist/pizzip.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.47.3/build/docxtemplater.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>
const PDF_API = "https://payment-notice-tool.onrender.com/pdf";

function setFile(type, input) {
  const f = input.files[0]; if (!f) return;
  const badge = document.getElementById(type + "Name");
  badge.textContent = f.name; badge.style.display = "inline-block";
  document.getElementById("btn").disabled =
    !(document.getElementById("wordFile").files[0] && document.getElementById("excelFile").files[0]);
}
["wordArea","excelArea"].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener("dragover", e => { e.preventDefault(); el.classList.add("drag-over"); });
  ["dragleave","drop"].forEach(ev => el.addEventListener(ev, () => el.classList.remove("drag-over")));
});
function showStatus(msg, type) {
  const s = document.getElementById("status");
  s.innerHTML = msg; s.className = "status " + type; s.style.display = "block";
}
function setProgress(pct) {
  document.getElementById("bar").style.display = "block";
  document.getElementById("fill").style.width = pct + "%";
}
function safeName(n) { return n.replace(/[\/\:*?"<>|]/g,"").trim() || "未知"; }
async function readExcel(file) {
  const wb = XLSX.read(await file.arrayBuffer(), { type: "array" });
  const ws = wb.Sheets["Sheet1"];
  if (!ws) throw new Error("Excel 中找不到 Sheet1");
  return XLSX.utils.sheet_to_json(ws, { defval: "" });
}
async function generate() {
  const btn = document.getElementById("btn");
  btn.disabled = true; btn.textContent = "生成中，请稍候…";
  showStatus("正在读取文件…", "info"); setProgress(10);
  try {
    const rows = await readExcel(document.getElementById("excelFile").files[0]);
    if (!rows.length) throw new Error("Excel Sheet1 没有数据行");
    const tmplBuf = await document.getElementById("wordFile").files[0].arrayBuffer();
    const nameCount = {}, docxEntries = [];
    showStatus("共 " + rows.length + " 行，生成 Word 中…", "info"); setProgress(20);
    for (let i = 0; i < rows.length; i++) {
      const strRow = Object.fromEntries(Object.entries(rows[i]).map(([k,v])=>[k,String(v??"")]));
      const company = strRow["公司名称"] || ("客户" + (i+1));
      const base = safeName(company) + "_付款通知书";
      nameCount[base] = (nameCount[base]||0) + 1;
      const uname = nameCount[base] === 1 ? base : base + "_" + nameCount[base];
      const pz = new PizZip(tmplBuf);
      const doc = new Docxtemplater(pz, { paragraphLoop: true, linebreaks: true });
      doc.render(strRow);
      docxEntries.push({ name: uname, buf: doc.getZip().generate({ type: "arraybuffer" }) });
      setProgress(20 + Math.round(40*(i+1)/rows.length));
    }
    showStatus("Word 已生成，转换 PDF 中…", "info"); setProgress(62);
    const pdfEntries = [];
    for (let i = 0; i < docxEntries.length; i++) {
      const { name, buf } = docxEntries[i];
      try {
        const fd = new FormData();
        fd.append("file", new Blob([buf], { type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" }), name + ".docx");
        const resp = await fetch(PDF_API, { method: "POST", body: fd });
        if (resp.ok) pdfEntries.push({ name, buf: await resp.arrayBuffer() });
        else console.warn("PDF fail", name, await resp.text());
      } catch(e) { console.warn("PDF err", name, e.message); }
      setProgress(62 + Math.round(28*(i+1)/docxEntries.length));
    }
    showStatus("打包 ZIP…", "info"); setProgress(92);
    const zip = new JSZip();
    for (const { name, buf } of docxEntries) zip.file("Word/" + name + ".docx", buf);
    for (const { name, buf } of pdfEntries)  zip.file("PDF/"  + name + ".pdf",  buf);
    const blob = await zip.generateAsync({ type: "blob", compression: "DEFLATE" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = "付款通知书.zip"; a.click();
    URL.revokeObjectURL(a.href);
    setProgress(100);
    const note = pdfEntries.length < docxEntries.length
      ? "（" + (docxEntries.length - pdfEntries.length) + " 个 PDF 失败，Word 完整）" : "";
    showStatus("✅ 成功！" + docxEntries.length + " 份 Word、" + pdfEntries.length + " 份 PDF。" + note, "success");
  } catch(e) {
    showStatus("❌ " + e.message, "error");
  } finally {
    btn.disabled = false; btn.textContent = "生成并下载 ZIP";
    setTimeout(() => {
      document.getElementById("bar").style.display = "none";
      document.getElementById("fill").style.width = "0%";
    }, 2000);
  }
}
</script>
</body>
</html>
